  path: baidusitemap.xml

# ========== Search ========== #
algolia_search:
  enable: false
  hits:
    per_page: 5
  labels:
    input_placeholder: 在这里输入检索内容
    hits_empty: "We did not find any results for the search: ${query}"
    hits_stats: "${hits} results found in ${time} ms"

